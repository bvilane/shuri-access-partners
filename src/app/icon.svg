<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Circular background -->
  <circle cx="32" cy="32" r="30" fill="#1b4332" stroke="none"/>

  <!-- Three rondavel huts - simplified for favicon size -->
  <!-- Center hut (larger) -->
  <path d="M32 14 L24 24 L40 24 Z" fill="none" stroke="#faf8f5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="25" y="24" width="14" height="12" fill="none" stroke="#faf8f5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M30 36 L30 30 Q32 28 34 30 L34 36" fill="none" stroke="#faf8f5" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left hut (smaller) -->
  <path d="M20 20 L16 25 L24 25 Z" fill="none" stroke="#faf8f5" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="16.5" y="25" width="7" height="7" fill="none" stroke="#faf8f5" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right hut (smaller) -->
  <path d="M44 20 L40 25 L48 25 Z" fill="none" stroke="#faf8f5" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="40.5" y="25" width="7" height="7" fill="none" stroke="#faf8f5" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ground line -->
  <line x1="12" y1="38" x2="52" y2="38" stroke="#faf8f5" stroke-width="1.2" stroke-linecap="round"/>

  <!-- "ACCESS" text at bottom -->
  <text x="32" y="49" text-anchor="middle" fill="#c9a84c" font-family="Arial, sans-serif" font-size="7" font-weight="bold" letter-spacing="1.5">ACCESS</text>
</svg>
